<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Marketing OS — Interactive Mock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0C0E10;
    --panel: #161A1D;
    --panel-2: #1F2428;
    --panel-3: #262B30;
    --border: #2A2F33;
    --text: #F4F2EE;
    --muted: #8A8880;
    --faint: #4A4845;
    --orange: #E8621A;
    --amber: #F5A623;
    --teal: #3D9BAD;
    --spark: #D93B18;
    --green: #6FB65A;
    --red: #D9534F;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
    font-size: 14px;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea, select { font-family: inherit; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .topbar .brand {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 22px;
    text-transform: uppercase;
    letter-spacing: 0.005em;
  }
  .topbar .brand em { font-style: normal; color: var(--orange); }
  .topbar .meta {
    display: flex;
    gap: 18px;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }
  .topbar .meta .pulse {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 0 rgba(111,182,90,0.6);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(111,182,90,0.6); }
    70% { box-shadow: 0 0 0 8px rgba(111,182,90,0); }
    100% { box-shadow: 0 0 0 0 rgba(111,182,90,0); }
  }
  .topbar .reset {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 3px;
  }
  .topbar .reset:hover { color: var(--red); border-color: var(--red); }

  .layout {
    display: grid;
    grid-template-columns: 220px 1fr 360px;
    min-height: calc(100vh - 53px);
  }
  @media (max-width: 1100px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar, .rightbar { border: none !important; }
  }

  /* ── SIDEBAR ─────────────────────────────────────────── */
  .sidebar {
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 24px 0;
  }
  .sidebar .group {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.16em;
    color: var(--muted);
    text-transform: uppercase;
    padding: 14px 24px 8px;
  }
  .sidebar .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 24px;
    font-size: 13px;
    color: var(--text);
    border-left: 2px solid transparent;
    transition: background 0.15s, border-color 0.15s;
    width: 100%;
    text-align: left;
  }
  .sidebar .nav-item:hover { background: var(--panel-2); }
  .sidebar .nav-item.active {
    background: var(--panel-2);
    border-left-color: var(--orange);
  }
  .sidebar .nav-item .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--orange);
  }
  .sidebar .nav-item.teal .dot  { background: var(--teal); }
  .sidebar .nav-item.spark .dot { background: var(--spark); }
  .sidebar .nav-item.amber .dot { background: var(--amber); }
  .sidebar .nav-item .badge {
    margin-left: auto;
    background: var(--panel-3);
    color: var(--muted);
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    padding: 2px 7px;
    border-radius: 10px;
  }
  .sidebar .nav-item.active .badge {
    background: var(--orange);
    color: var(--bg);
  }

  /* ── MAIN ───────────────────────────────────────────── */
  .main { padding: 32px 40px; min-width: 0; }
  .panel-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 36px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .panel-title em { font-style: normal; color: var(--orange); }
  .panel-sub {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 28px;
  }

  .scenario-card {
    background: var(--panel);
    border-left: 3px solid var(--orange);
    padding: 18px 22px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: background 0.15s, transform 0.15s;
  }
  .scenario-card:hover { background: var(--panel-2); transform: translateX(2px); }
  .scenario-card.teal { border-left-color: var(--teal); }
  .scenario-card.spark { border-left-color: var(--spark); }
  .scenario-card.amber { border-left-color: var(--amber); }
  .scenario-card .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    color: var(--orange);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .scenario-card.teal .label { color: var(--teal); }
  .scenario-card.spark .label { color: var(--spark); }
  .scenario-card.amber .label { color: var(--amber); }
  .scenario-card .ttl {
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 4px;
  }
  .scenario-card .pre {
    color: var(--muted);
    font-size: 13px;
  }

  .custom-form {
    background: var(--panel);
    padding: 22px;
    margin-top: 18px;
    border-left: 3px solid var(--faint);
  }
  .custom-form label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .custom-form textarea, .custom-form input, .custom-form select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    font-size: 13.5px;
    border-radius: 3px;
    margin-bottom: 14px;
    font-family: inherit;
    resize: vertical;
  }
  .custom-form textarea:focus, .custom-form input:focus {
    outline: none;
    border-color: var(--orange);
  }
  .btn-primary {
    background: var(--orange);
    color: var(--bg);
    padding: 11px 20px;
    border-radius: 3px;
    font-weight: 600;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-primary:hover { opacity: 0.92; }
  .btn-primary:active { transform: translateY(1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-ghost {
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 16px;
    border-radius: 3px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .btn-ghost:hover { border-color: var(--orange); color: var(--orange); }

  /* ── PROCESSING ─────────────────────────────────────── */
  .processing {
    background: var(--panel);
    border-left: 3px solid var(--amber);
    padding: 22px;
    margin: 18px 0;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .processing .spinner {
    width: 24px; height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--amber);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .processing .step {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--amber);
    letter-spacing: 0.06em;
  }

  /* ── RIGHTBAR (queue) ───────────────────────────────── */
  .rightbar {
    background: var(--panel);
    border-left: 1px solid var(--border);
    padding: 24px;
    overflow-y: auto;
    max-height: calc(100vh - 53px);
    position: sticky;
    top: 53px;
  }
  .rightbar h3 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 900;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .rightbar .sub {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 18px;
  }
  .queue-item {
    background: var(--panel-2);
    padding: 14px 16px;
    margin-bottom: 10px;
    border-left: 2px solid var(--orange);
    cursor: pointer;
    transition: background 0.15s, transform 0.15s;
  }
  .queue-item:hover { background: var(--panel-3); }
  .queue-item.teal { border-left-color: var(--teal); }
  .queue-item.spark { border-left-color: var(--spark); }
  .queue-item.amber { border-left-color: var(--amber); }
  .queue-item.approved { opacity: 0.55; border-left-color: var(--green); }
  .queue-item .qlabel {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.16em;
    color: var(--orange);
    margin-bottom: 4px;
  }
  .queue-item.teal .qlabel { color: var(--teal); }
  .queue-item.spark .qlabel { color: var(--spark); }
  .queue-item.amber .qlabel { color: var(--amber); }
  .queue-item.approved .qlabel { color: var(--green); }
  .queue-item .qttl { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
  .queue-item .qsub { font-size: 11.5px; color: var(--muted); }
  .empty-queue {
    color: var(--muted);
    font-size: 12.5px;
    padding: 20px;
    text-align: center;
    font-style: italic;
    background: var(--panel-2);
    border: 1px dashed var(--border);
  }

  /* ── DRAFT DETAIL ───────────────────────────────────── */
  .draft-section {
    background: var(--panel);
    margin-bottom: 14px;
    border-left: 3px solid var(--orange);
  }
  .draft-section .ds-head {
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--border);
  }
  .draft-section .ds-channel {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--orange);
    flex-grow: 1;
  }
  .draft-section.teal { border-left-color: var(--teal); }
  .draft-section.spark { border-left-color: var(--spark); }
  .draft-section.amber { border-left-color: var(--amber); }
  .draft-section.green { border-left-color: var(--green); }
  .draft-section.teal .ds-channel { color: var(--teal); }
  .draft-section.spark .ds-channel { color: var(--spark); }
  .draft-section.amber .ds-channel { color: var(--amber); }
  .draft-section.green .ds-channel { color: var(--green); }

  .ds-body { padding: 18px 20px; }
  .ds-body textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    font-size: 13.5px;
    line-height: 1.6;
    border-radius: 3px;
    resize: vertical;
    min-height: 70px;
  }
  .ds-body textarea:focus { outline: none; border-color: var(--orange); }
  .ds-meta {
    display: flex;
    gap: 14px;
    margin-top: 8px;
    font-size: 11.5px;
    color: var(--muted);
  }
  .ds-actions {
    padding: 12px 20px;
    background: var(--panel-2);
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .ds-actions .draft-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-right: auto;
  }
  .btn-approve {
    background: var(--green);
    color: var(--bg);
    padding: 7px 16px;
    border-radius: 3px;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .btn-reject {
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 7px 14px;
    border-radius: 3px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .btn-reject:hover { color: var(--red); border-color: var(--red); }

  .approve-all-bar {
    background: var(--panel);
    border-left: 3px solid var(--green);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }
  .approve-all-bar .lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--green);
    flex-grow: 1;
  }

  /* ── PUBLISHED PREVIEWS ─────────────────────────────── */
  .published-card {
    background: var(--panel);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 14px;
    border: 1px solid var(--border);
  }
  .pc-head {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--panel-2);
  }
  .pc-head .icon {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--orange);
    color: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800;
    font-size: 13px;
    font-family: 'Barlow Condensed', sans-serif;
  }
  .pc-head .who { font-weight: 600; font-size: 13px; }
  .pc-head .when { color: var(--muted); font-size: 11.5px; margin-left: auto; }
  .pc-body { padding: 14px 16px; font-size: 13.5px; line-height: 1.55; }
  .pc-body .hashtags { color: var(--orange); margin-top: 8px; font-size: 12.5px; }
  .pc-meta {
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.06em;
  }

  /* Tabs in main */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 10px 18px;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border-bottom: 2px solid transparent;
  }
  .tab.active {
    color: var(--text);
    border-bottom-color: var(--orange);
  }

  .empty {
    background: var(--panel);
    border: 1px dashed var(--border);
    padding: 32px;
    color: var(--muted);
    text-align: center;
    font-size: 13px;
  }

  .review-input {
    background: var(--panel-2);
    padding: 14px 18px;
    border-radius: 4px;
    margin-bottom: 14px;
  }
  .review-input .stars { color: var(--amber); font-size: 14px; letter-spacing: 0.1em; }
  .review-input .who { font-size: 11.5px; color: var(--muted); margin: 4px 0 6px; }
  .review-input .text { font-size: 13.5px; color: var(--text); }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--green);
    color: var(--bg);
    padding: 12px 22px;
    border-radius: 3px;
    font-size: 13px;
    font-weight: 600;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-6px); }

  .seo-page-preview {
    background: white;
    color: #1a1a1a;
    padding: 28px 32px;
    border-radius: 4px;
    font-family: 'Inter', sans-serif;
  }
  .seo-page-preview h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 900;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 8px;
  }
  .seo-page-preview .meta-desc {
    font-size: 12px;
    color: #666;
    font-style: italic;
    border-bottom: 1px dashed #ccc;
    padding-bottom: 12px;
    margin-bottom: 14px;
  }
  .seo-page-preview h2 {
    font-size: 16px;
    color: #1a1a1a;
    margin-top: 14px;
    margin-bottom: 6px;
    font-weight: 700;
  }
  .seo-page-preview p { font-size: 13.5px; margin-bottom: 10px; line-height: 1.55; }

  .footer-link {
    display: block;
    text-align: center;
    padding: 18px;
    color: var(--muted);
    font-size: 12px;
    text-decoration: none;
    border-top: 1px solid var(--border);
  }
  .footer-link a { color: var(--orange); }

  /* ── DICTATION ─────────────────────────────────────────── */
  .ds-textarea-wrap { position: relative; }
  .mic-btn {
    position: absolute;
    bottom: 10px;
    right: 10px;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--panel-3);
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
    border: 1px solid var(--border);
    z-index: 2;
  }
  .mic-btn:hover {
    color: var(--orange);
    border-color: var(--orange);
    background: var(--panel);
  }
  .mic-btn.recording {
    background: var(--red);
    color: white;
    border-color: var(--red);
    box-shadow: 0 0 0 0 rgba(217,83,79,0.7);
    animation: micPulse 1.4s infinite;
  }
  .mic-btn.recording:hover { background: var(--red); color: white; }
  @keyframes micPulse {
    0%   { box-shadow: 0 0 0 0 rgba(217,83,79,0.6); }
    70%  { box-shadow: 0 0 0 12px rgba(217,83,79,0); }
    100% { box-shadow: 0 0 0 0 rgba(217,83,79,0); }
  }
  .mic-btn svg { width: 16px; height: 16px; }
  .mic-btn[disabled] { opacity: 0.3; cursor: not-allowed; }

  .live-transcript {
    margin-top: 8px;
    padding: 10px 14px;
    background: rgba(217,83,79,0.08);
    border-left: 2px solid var(--red);
    font-size: 12.5px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    line-height: 1.5;
    display: none;
  }
  .live-transcript.active { display: block; }
  .live-transcript .label {
    color: var(--red);
    font-size: 10px;
    letter-spacing: 0.16em;
    margin-bottom: 4px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .live-transcript .label::before {
    content: '';
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    animation: micPulse 1.4s infinite;
  }
  .live-transcript .interim { opacity: 0.55; font-style: italic; }

  .polishing {
    margin-top: 8px;
    padding: 10px 14px;
    background: rgba(245,166,35,0.08);
    border-left: 2px solid var(--amber);
    font-size: 12.5px;
    color: var(--amber);
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .polishing .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(245,166,35,0.25);
    border-top-color: var(--amber);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .dictation-toggle {
    margin-top: 8px;
    display: flex;
    gap: 0;
    align-items: center;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
  }
  .dictation-toggle .dt-label {
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-right: 10px;
    text-transform: uppercase;
  }
  .dictation-toggle .dt-btn {
    background: var(--panel-2);
    color: var(--muted);
    padding: 4px 12px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border: 1px solid var(--border);
  }
  .dictation-toggle .dt-btn:first-of-type { border-radius: 3px 0 0 3px; }
  .dictation-toggle .dt-btn:last-of-type  { border-radius: 0 3px 3px 0; border-left: none; }
  .dictation-toggle .dt-btn.active {
    background: var(--orange);
    color: var(--bg);
    border-color: var(--orange);
  }
  .dictation-toggle .dt-meta {
    margin-left: auto;
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.06em;
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--panel-3); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--faint); }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">Marketing <em>OS</em> · Demo</div>
  <div class="meta">
    <span><span class="pulse"></span> &nbsp;tenant:&nbsp;jones</span>
    <span>·</span>
    <span id="stat-pending">0 pending</span>
    <span>·</span>
    <span id="stat-published">0 published</span>
    <button class="reset" onclick="resetDemo()">Reset demo</button>
  </div>

// ════════════════════════════════════════════════════════════════════════
//  STATE — localStorage-backed
// ════════════════════════════════════════════════════════════════════════
const STORAGE_KEY = 'mos_demo_state_v1';
const DEFAULT_STATE = { drafts: [], view: 'field' };
let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return structuredClone(DEFAULT_STATE);
    return JSON.parse(raw);
  } catch (e) { return structuredClone(DEFAULT_STATE); }
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function resetDemo() {
  if (!confirm('Reset the demo? All drafts will be cleared.')) return;
  state = structuredClone(DEFAULT_STATE);
  saveState();
  render();
}
function uid() { return Math.random().toString(36).slice(2, 10); }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ════════════════════════════════════════════════════════════════════════
//  RENDERING
// ════════════════════════════════════════════════════════════════════════
function render() {
  const main = document.getElementById('main');

  // Sidebar active
  document.querySelectorAll('.nav-item').forEach(b => {
    b.classList.toggle('active', b.dataset.view === state.view);
  });

  // Counts
  const pending = state.drafts.filter(d => d.status === 'pending').length;
  const published = state.drafts.filter(d => d.status === 'approved').length;
  document.getElementById('stat-pending').textContent = `${pending} pending`;
  document.getElementById('stat-published').textContent = `${published} published`;
  document.getElementById('badge-field').textContent = state.drafts.filter(d => d.kind==='field' && d.status==='pending').length;
  document.getElementById('badge-reviews').textContent = state.drafts.filter(d => d.kind==='review' && d.status==='pending').length;
  document.getElementById('badge-leads').textContent = state.drafts.filter(d => d.kind==='lead' && d.status==='pending').length;
  document.getElementById('badge-seo').textContent = state.drafts.filter(d => d.kind==='seo' && d.status==='pending').length;
  document.getElementById('badge-published').textContent = published;

  // View
  if (state.view === 'field') main.innerHTML = renderField();
  else if (state.view === 'reviews') main.innerHTML = renderReviews();
  else if (state.view === 'leads') main.innerHTML = renderLeads();
  else if (state.view === 'seo') main.innerHTML = renderSeo();
  else if (state.view === 'published') main.innerHTML = renderPublished();
  else if (state.view === 'about') main.innerHTML = renderAbout();
  else if (state.view === 'draft') main.innerHTML = renderDraft();

  renderQueue();
}

function renderQueue() {
  const q = document.getElementById('queue');
  const items = state.drafts.slice().reverse();
  if (items.length === 0) {
    q.innerHTML = `<div class="empty-queue">No drafts yet. Start by clicking a scenario in the main panel.</div>`;
    return;
  }
  q.innerHTML = items.map(d => {
    const cls = d.kind === 'review' ? 'teal' : d.kind === 'lead' ? 'amber' : d.kind === 'seo' ? 'spark' : '';
    const stamp = d.status === 'approved' ? 'approved' : '';
    let label = '', sub = '';
    if (d.kind === 'field') {
      const sc = FIELD_SCENARIOS.find(s => s.id === d.scenario);
      label = 'FIELD INTAKE'; sub = sc.title;
    } else if (d.kind === 'review') {
      const rv = REVIEW_SCENARIOS.find(r => r.id === d.scenario);
      label = 'REVIEW REPLY'; sub = `${rv.rating}★ from ${rv.name}`;
    } else if (d.kind === 'lead') {
      const ld = LEAD_SCENARIOS.find(l => l.id === d.scenario);
      label = 'LEAD TRIAGE'; sub = ld.name;
    } else if (d.kind === 'seo') {
      const t = SEO_TARGETS.find(x => x.id === d.scenario);
      label = 'SEO PAGE'; sub = t.keyword;
    }
    return `
      <div class="queue-item ${cls} ${stamp}" onclick="openDraft('${d.id}')">
        <div class="qlabel">${label} ${d.status==='approved'?'· APPROVED':''}</div>
        <div class="qttl">${escapeHtml(sub)}</div>
        <div class="qsub">draft_${d.id}</div>
      </div>
    `;
  }).join('');
}

//  HANDLERS
// ════════════════════════════════════════════════════════════════════════
function setView(v) { state.view = v; saveState(); render(); }

function processSimulation(label, then) {
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="panel-title">Agent <em>·</em> running</div>
    <div class="processing"><div class="spinner"></div><div class="step" id="proc-step">${label}</div></div>
  `;
  const steps = [label, '> Loading tenant config (jones)', '> Rendering brand-voice prompt', '> Calling Claude API', '> Parsing JSON output', '> Landing in approval queue'];
  let i = 0;
  const interval = setInterval(() => {
    i++;
    if (i >= steps.length) {
      clearInterval(interval);
      then();
      return;
    }
    document.getElementById('proc-step').textContent = steps[i];
  }, 380);
}

function runField(scenarioId) {
  const sc = FIELD_SCENARIOS.find(s => s.id === scenarioId);
  processSimulation('> Receiving foreman text-in via Twilio webhook', () => {
    const id = uid();
    state.drafts.push({
      id,
      kind: 'field',
      scenario: scenarioId,
      brand: sc.division === 'fab' ? 'callus' : 'jones',
      status: 'pending',
      outputs: {
        linkedin: sc.drafts.linkedin,
        linkedin_tags: sc.drafts.linkedin_tags,
        gmb: sc.drafts.gmb,
        gmb_cta: sc.drafts.gmb_cta,
        instagram: sc.drafts.instagram,
        instagram_tags: sc.drafts.instagram_tags,
        blog: sc.drafts.blog,
        blog_title: sc.drafts.blog_title,
        newsletter: sc.drafts.newsletter
      }
    });
    state.view = 'draft';
    state.activeDraft = id;
    saveState();
    render();
    toast('Field-to-Content drafted 5 outputs');
  });
}

function runFieldCustom() {
  const txt = document.getElementById('custom-field').value.trim();
  if (!txt) { toast('Type something first'); return; }
  // Find best-match scenario by simple keyword
  const lower = txt.toLowerCase();
  let pick = FIELD_SCENARIOS[0];
  if (lower.includes('weld') || lower.includes('shop') || lower.includes('mig') || lower.includes('fab')) pick = FIELD_SCENARIOS[2];
  else if (lower.includes('handrail') || lower.includes('stainless')) pick = FIELD_SCENARIOS[3];
  else if (lower.includes('utilit') || lower.includes('sewer') || lower.includes('water') || lower.includes('storm')) pick = FIELD_SCENARIOS[1];
  else pick = FIELD_SCENARIOS[0];
  toast('Matched closest scenario: ' + pick.title);
  runField(pick.id);
}

function runReview(rid) {
  const rv = REVIEW_SCENARIOS.find(r => r.id === rid);
  processSimulation('> New Google review detected', () => {
    const id = uid();
    state.drafts.push({
      id, kind: 'review', scenario: rid, status: 'pending',
      outputs: { ...rv.response }
    });
    state.view = 'draft';
    state.activeDraft = id;
    saveState();
    render();
    toast('Reputation agent drafted reply');
  });
}

function runLead(lid) {
  processSimulation('> Contact form submitted', () => {
    const id = uid();
    state.drafts.push({ id, kind: 'lead', scenario: lid, status: 'pending', outputs: {} });
    state.view = 'draft';
    state.activeDraft = id;
    saveState();
    render();
    toast('Lead Triage agent processed');
  });
}

function runSeo(tid) {
  processSimulation('> Monthly SEO content cycle triggered', () => {
    const id = uid();
    state.drafts.push({ id, kind: 'seo', scenario: tid, status: 'pending', outputs: {} });
    state.view = 'draft';
    state.activeDraft = id;
    saveState();
    render();
    toast('SEO Content agent drafted page');
  });
}

function openDraft(id) {
  state.view = 'draft';
  state.activeDraft = id;
  saveState();
  render();
}

function updateDraft(id, key, value) {
  const d = state.drafts.find(x => x.id === id);
  if (!d) return;
  d.outputs[key] = value;
  saveState();
}

function approveAll(id) {
  const d = state.drafts.find(x => x.id === id);
  if (!d) return;
  d.status = 'approved';
  d.approved_at = new Date().toISOString();
  saveState();
  toast('Approved — published');
  state.view = 'published';
  render();
}

function rejectDraft(id) {
  if (!confirm('Reject and delete this draft?')) return;
  state.drafts = state.drafts.filter(x => x.id !== id);
  saveState();
  toast('Draft rejected');
  state.view = ({field:'field',review:'reviews',lead:'leads',seo:'seo'})[
    state.drafts.find(x=>x.id===id)?.kind || 'field'] || 'field';
  render();
}

// ════════════════════════════════════════════════════════════════════════
//  DICTATION — Web Speech API + brand-voice polish
// ════════════════════════════════════════════════════════════════════════
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let activeRecognizer = null; // only one mic at a time
let activeFieldKey = null;
let activeDraftId = null;
let recordStartedAt = 0;

function micToggle(draftId, fieldKey) {
  // Stop existing
  if (activeRecognizer) {
    try { activeRecognizer.stop(); } catch(e) {}
    return;
  }
  if (!SpeechRecognition) {
    toast('Voice capture not supported — try Chrome or Safari');
    return;
  }
  const fid = `f_${draftId}_${fieldKey}`;
  const micBtn = document.getElementById(`${fid}_mic`);
  const lt = document.getElementById(`${fid}_lt`);
  const ltFinal = lt.querySelector('.final');
  const ltInterim = lt.querySelector('.interim');
  ltFinal.textContent = '';
  ltInterim.textContent = '';
  lt.classList.add('active');
  micBtn.classList.add('recording');
  micBtn.title = 'Stop dictation';

  const rec = new SpeechRecognition();
  rec.continuous = true;
  rec.interimResults = true;
  rec.lang = 'en-US';
  let finalTranscript = '';
  recordStartedAt = Date.now();

  rec.onresult = (event) => {
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const piece = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        finalTranscript += piece + ' ';
      } else {
        interim += piece;
      }
    }
    ltFinal.textContent = finalTranscript;
    ltInterim.textContent = interim ? ' ' + interim : '';
  };

  rec.onerror = (event) => {
    if (event.error === 'no-speech') return; // benign
    toast('Mic error: ' + event.error);
  };

  rec.onend = () => {
    micBtn.classList.remove('recording');
    micBtn.title = 'Dictate';
    lt.classList.remove('active');
    activeRecognizer = null;
    activeFieldKey = null;
    activeDraftId = null;
    const raw = (finalTranscript + ' ' + (ltInterim.textContent || '')).trim();
    if (!raw) {
      toast('Nothing captured');
      return;
    }
    runPolish(draftId, fieldKey, raw, Math.round((Date.now() - recordStartedAt) / 1000));
  };

  try { rec.start(); }
  catch (e) { toast('Could not start mic — check permissions'); micBtn.classList.remove('recording'); lt.classList.remove('active'); return; }
  activeRecognizer = rec;
  activeFieldKey = fieldKey;
  activeDraftId = draftId;
}

function runPolish(draftId, fieldKey, raw, durationSec) {
  const fid = `f_${draftId}_${fieldKey}`;
  const polishEl = document.getElementById(`${fid}_polish`);
  if (polishEl) polishEl.style.display = 'flex';

  // Simulate Claude API call latency
  setTimeout(() => {
    const polished = polishTranscript(raw, fieldKey);
    const d = state.drafts.find(x => x.id === draftId);
    if (!d) return;
    if (!d.dictation) d.dictation = {};
    d.dictation[fieldKey] = {
      raw: raw,
      polished: polished,
      view: 'polished',
      duration: durationSec,
      word_count: raw.split(/\s+/).filter(Boolean).length,
      timestamp: new Date().toISOString()
    };
    d.outputs[fieldKey] = polished;
    saveState();
    if (polishEl) polishEl.style.display = 'none';
    render();
    toast('Polished into Jones brand voice');
  }, 1100);
}

function dictView(draftId, fieldKey, which) {
  const d = state.drafts.find(x => x.id === draftId);
  if (!d || !d.dictation || !d.dictation[fieldKey]) return;
  const dict = d.dictation[fieldKey];
  dict.view = which;
  d.outputs[fieldKey] = which === 'raw' ? dict.raw : dict.polished;
  saveState();
  render();
}

/**
 * polishTranscript — demo-grade brand-voice cleanup.
 * In production this is a Claude API call with the tenant's brand-voice
 * prompt. The cleanup rules below mimic what that prompt would produce.
 */
function polishTranscript(raw, fieldKey) {
  let text = raw.trim();

  // 1. Strip filler words
  const fillers = /\b(uh+|um+|er+|ah+|hmm+|like|you know|i mean|basically|literally|sorta|kinda|sort of|kind of|right\?|y'know|yeah)\b[,]?\s*/gi;
  text = text.replace(fillers, '');

  // 2. Collapse repeated words ("the the", "we we")
  text = text.replace(/\b(\w+)(\s+\1\b)+/gi, '$1');

  // 3. Normalize whitespace
  text = text.replace(/\s+/g, ' ').trim();
  text = text.replace(/\s+([,.!?])/g, '$1');

  // 4. Capitalize known names + brand terms
  const NAMES = ['brent','cassidy','aaron','steve','rico','marco','tony','manny','linda','jen','jones','callus','holladay','spanish fork','utah','salt lake','mapleton','wasatch','udot','rocky mountain power','dominion energy','lehi','sandy','west jordan','kaysville','tooele','provo'];
  NAMES.forEach(name => {
    const re = new RegExp('\\b' + name.replace(/ /g, '\\s+') + '\\b', 'gi');
    text = text.replace(re, name.replace(/\b\w/g, c => c.toUpperCase()));
  });

  // 5. Capitalize "I" forms
  text = text.replace(/\bi\b/g, 'I');
  text = text.replace(/\bi'm\b/gi, "I'm");
  text = text.replace(/\bi'll\b/gi, "I'll");
  text = text.replace(/\bi've\b/gi, "I've");
  text = text.replace(/\bi'd\b/gi, "I'd");

  // 6. Sentence-case
  text = text.replace(/(^|[.!?]\s+)([a-z])/g, (_, p1, p2) => p1 + p2.toUpperCase());

  // 7. Ensure ending punctuation
  if (!/[.!?]$/.test(text)) text += '.';

  // 8. Brand-voice flourishes — context-aware (review reply variants)
  const lower = text.toLowerCase();
  if (fieldKey === 'response') {
    // 1-2 star: ensure named-contact close present
    if (/sorry|apolog|terrible|frustrat|disappoint/.test(lower) && !/call|reach out/.test(lower)) {
      text = text.replace(/\.$/, '. Please give Steve a call at the office so we can look into it.');
    }
    // 5-star: tighten openers
    if (/thanks|thank you|appreciate/.test(lower) && text.length > 280) {
      // (placeholder for length trimming)
    }
  }
  return text;
}
window.micToggle = micToggle;
window.dictView = dictView;

// ════════════════════════════════════════════════════════════════════════
//  UTIL
// ════════════════════════════════════════════════════════════════════════
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

    saveState();
    render();
  });
});
