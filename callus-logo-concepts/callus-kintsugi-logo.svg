<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>

    <!-- GOLD GRADIENTS -->
    <linearGradient id="g-vert" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#F5E080"/>
      <stop offset="38%"  stop-color="#D4A94A"/>
      <stop offset="100%" stop-color="#6E4A0A"/>
    </linearGradient>
    <linearGradient id="g-horiz" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#EDD060"/>
      <stop offset="30%"  stop-color="#D4A94A"/>
      <stop offset="68%"  stop-color="#BE8C25"/>
      <stop offset="100%" stop-color="#7A5510"/>
    </linearGradient>
    <linearGradient id="g-diag" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#F0D870" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#E8C860" stop-opacity="1"/>
      <stop offset="60%"  stop-color="#C89030"/>
      <stop offset="100%" stop-color="#7A5510" stop-opacity="0"/>
    </linearGradient>

    <!-- GLOW FILTER — veins -->
    <filter id="f-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- GLOW FILTER — text -->
    <filter id="f-txt" x="-8%" y="-40%" width="116%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- SUBTLE EDGE GLOW — glove outline -->
    <filter id="f-edge" x="-4%" y="-4%" width="108%" height="108%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- ─── BACKGROUND ─────────────────────────────── -->
  <rect width="600" height="600" fill="#0A0908"/>

  <!-- corner registration marks (premium label feel) -->
  <path d="M 22,22 L 54,22 L 54,25 L 25,25 L 25,54 L 22,54 Z"          fill="#D4A94A" opacity="0.38"/>
  <path d="M 578,22 L 546,22 L 546,25 L 575,25 L 575,54 L 578,54 Z"    fill="#D4A94A" opacity="0.38"/>
  <path d="M 22,578 L 54,578 L 54,575 L 25,575 L 25,546 L 22,546 Z"    fill="#D4A94A" opacity="0.28"/>
  <path d="M 578,578 L 546,578 L 546,575 L 575,575 L 575,546 L 578,546 Z" fill="#D4A94A" opacity="0.28"/>

  <!-- ─── GLOVE ──────────────────────────────────── -->
  <!-- slight dynamic tilt: -8 deg around center of palm -->
  <g transform="rotate(-8, 296, 270)">

    <!-- ── Glove fill layers (dark charcoal, barely off-black) ── -->

    <!-- CUFF — trapezoid, wider at base -->
    <path d="M 150,392 C 146,396 143,398 140,396 L 140,370 L 452,370 L 452,396 C 449,398 446,396 442,392 Z"
          fill="#1A140C"/>
    <path d="M 143,370 L 149,340 L 443,340 L 449,370 Z" fill="#1E1810"/>

    <!-- PALM — bridges cuff to finger bases -->
    <path d="M 152,340 L 162,255 L 452,255 L 458,290 L 460,320 L 448,340 Z" fill="#201A12"/>

    <!-- THUMB — angled right, exits from palm-right -->
    <!-- Base starts at palm right around (452,295), goes upper-right -->
    <path d="M 446,295 L 452,265 L 480,190 C 484,178 482,164 474,157
             C 466,150 454,153 448,162 L 426,228 L 432,268 Z"
          fill="#1E1810"/>
    <!-- Thumb tip rounded cap -->
    <ellipse cx="463" cy="158" rx="16" ry="19"
             fill="#1E1810" transform="rotate(-62, 463, 158)"/>

    <!-- FINGERS — pinky to index (left→right), each as rounded rect -->
    <!-- Pinky -->
    <rect x="162" y="118" width="52" height="140" rx="25" fill="#1C1810"/>
    <!-- Ring (slightly taller) -->
    <rect x="224" y="98"  width="52" height="160" rx="25" fill="#201A12"/>
    <!-- Middle (tallest) -->
    <rect x="286" y="82"  width="52" height="176" rx="25" fill="#1C1810"/>
    <!-- Index -->
    <rect x="348" y="96"  width="52" height="162" rx="25" fill="#201A12"/>

    <!-- Knuckle grooves (dark inset lines at each finger joint, mid-point) -->
    <line x1="165" y1="182" x2="211" y2="182" stroke="#100C08" stroke-width="2"/>
    <line x1="227" y1="172" x2="273" y2="172" stroke="#100C08" stroke-width="2"/>
    <line x1="289" y1="158" x2="335" y2="158" stroke="#100C08" stroke-width="2"/>
    <line x1="351" y1="170" x2="397" y2="170" stroke="#100C08" stroke-width="2"/>
    <!-- Lower knuckle (second joint) -->
    <line x1="166" y1="215" x2="211" y2="215" stroke="#100C08" stroke-width="1.5"/>
    <line x1="228" y1="205" x2="273" y2="205" stroke="#100C08" stroke-width="1.5"/>
    <line x1="290" y1="192" x2="335" y2="192" stroke="#100C08" stroke-width="1.5"/>
    <line x1="352" y1="204" x2="397" y2="204" stroke="#100C08" stroke-width="1.5"/>
    <!-- Cuff leather lines -->
    <line x1="148" y1="362" x2="450" y2="362" stroke="#140E08" stroke-width="2"/>
    <line x1="147" y1="378" x2="451" y2="378" stroke="#140E08" stroke-width="1.5"/>

    <!-- ══════════════════════════════════════════ -->
    <!-- ══   KINTSUGI GOLD VEINS                ══ -->
    <!-- Each path is a jagged "repaired crack"    -->
    <!-- rendered in molten gold with a warm glow  -->
    <!-- ══════════════════════════════════════════ -->

    <!-- MAIN VEIN — travels diagonally across the full glove height,
         from cuff bottom-left up through palm, through middle finger -->
    <path d="M 172,394
             L 185,375  L 178,360  L 192,342
             L 183,320  L 198,298  L 188,274
             L 205,252  L 194,228  L 210,205
             L 200,180  L 218,158  L 206,132
             L 222,108  L 212,86"
          fill="none" stroke="url(#g-vert)" stroke-width="2.8"
          stroke-linecap="round" stroke-linejoin="round"
          filter="url(#f-glow)"/>

    <!-- KNUCKLE VEIN — horizontal, runs across all four knuckle bases -->
    <path d="M 162,257
             L 188,252  L 220,258  L 244,252
             L 278,256  L 306,249  L 338,254
             L 362,250  L 398,256  L 428,260"
          fill="none" stroke="#D4A94A" stroke-width="2.2"
          stroke-linecap="round" stroke-linejoin="round"
          filter="url(#f-glow)"/>

    <!-- THUMB VEIN -->
    <path d="M 435,272
             L 448,242  L 440,215
             L 458,188  L 470,160"
          fill="none" stroke="#C8952A" stroke-width="2"
          stroke-linecap="round" filter="url(#f-glow)"/>

    <!-- RING+MIDDLE diagonal branch vein -->
    <path d="M 298,252
             L 308,225  L 298,198
             L 312,172  L 302,148
             L 316,118  L 306,88"
          fill="none" stroke="#C09030" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round"
          filter="url(#f-glow)"/>

    <!-- INDEX FINGER vein — short branch off the knuckle vein -->
    <path d="M 375,250
             L 368,220  L 380,194
             L 370,164  L 382,138
             L 372,108"
          fill="none" stroke="#B88025" stroke-width="1.6"
          stroke-linecap="round" filter="url(#f-glow)"/>

    <!-- CUFF lower vein — horizontal with character -->
    <path d="M 145,380
             L 175,374  L 210,380  L 248,372
             L 290,376  L 332,370  L 372,375
             L 410,369  L 448,374"
          fill="none" stroke="url(#g-horiz)" stroke-width="1.9"
          stroke-linecap="round" filter="url(#f-glow)"/>

    <!-- PALM cross-vein — shorter horizontal through mid-palm -->
    <path d="M 165,310
             L 195,305  L 228,312  L 260,306
             L 300,310  L 340,304  L 378,308
             L 412,302  L 440,307"
          fill="none" stroke="#B87820" stroke-width="1.5"
          stroke-linecap="round" filter="url(#f-glow)"/>

    <!-- PINKY SIDE vein -->
    <path d="M 166,232
             L 178,208  L 170,182
             L 184,158  L 174,128"
          fill="none" stroke="#A87018" stroke-width="1.4"
          stroke-linecap="round" filter="url(#f-glow)"/>

    <!-- SCATTER — tiny gold flecks at vein junctions -->
    <circle cx="192" cy="342" r="1.6" fill="#F0D860" opacity="0.85"/>
    <circle cx="183" cy="298" r="1.4" fill="#E0C050" opacity="0.75"/>
    <circle cx="203" cy="252" r="1.8" fill="#F0D860" opacity="0.90"/>
    <circle cx="210" cy="205" r="1.4" fill="#D4A94A" opacity="0.80"/>
    <circle cx="219" cy="158" r="1.6" fill="#F0D860" opacity="0.85"/>
    <circle cx="209" cy="108" r="1.3" fill="#D4A94A" opacity="0.70"/>
    <circle cx="312" cy="252" r="1.5" fill="#E8C055" opacity="0.80"/>
    <circle cx="302" cy="172" r="1.4" fill="#D4A94A" opacity="0.75"/>
    <circle cx="370" cy="250" r="1.6" fill="#E8C055" opacity="0.80"/>
    <circle cx="448" cy="242" r="1.3" fill="#D4A94A" opacity="0.70"/>
    <circle cx="290" cy="376" r="1.5" fill="#E0B840" opacity="0.65"/>

    <!-- EDGE HIGHLIGHTS — thin gold stroke on the outer silhouette
         catches the light like a broken edge that's been gilded -->
    <!-- Finger tops (arcs) -->
    <path d="M 165,122 C 165,110 175,100 188,100 C 201,100 211,110 211,122"
          fill="none" stroke="#D4A94A" stroke-width="0.9" opacity="0.55" filter="url(#f-edge)"/>
    <path d="M 227,102 C 227,90 237,80 250,80 C 263,80 273,90 273,102"
          fill="none" stroke="#D4A94A" stroke-width="0.9" opacity="0.55" filter="url(#f-edge)"/>
    <path d="M 289,86 C 289,74 299,64 312,64 C 325,64 335,74 335,86"
          fill="none" stroke="#D4A94A" stroke-width="0.9" opacity="0.55" filter="url(#f-edge)"/>
    <path d="M 351,100 C 351,88 361,78 374,78 C 387,78 397,88 397,100"
          fill="none" stroke="#D4A94A" stroke-width="0.9" opacity="0.55" filter="url(#f-edge)"/>
    <!-- Cuff bottom edge highlight -->
    <path d="M 145,393 C 146,398 148,400 154,400 L 442,400 C 448,400 450,398 451,393"
          fill="none" stroke="#C09030" stroke-width="0.8" opacity="0.45" filter="url(#f-edge)"/>

  </g>
  <!-- END GLOVE GROUP -->

  <!-- ─── WORDMARK ─────────────────────────────── -->

  <!-- Thin gold separator rule -->
  <line x1="48" y1="478" x2="552" y2="478"
        stroke="#D4A94A" stroke-width="0.8" opacity="0.45"/>

  <!-- CALLUS — ultra-bold, stretched to full width, gold gradient -->
  <text x="300" y="556"
        font-family="'Arial Black', 'Helvetica Neue', Impact, sans-serif"
        font-size="148"
        font-weight="900"
        font-style="normal"
        text-anchor="middle"
        textLength="548"
        lengthAdjust="spacingAndGlyphs"
        fill="url(#g-horiz)"
        filter="url(#f-txt)">CALLUS</text>

  <!-- FABRICATION — italic, letter-spaced, antique gold -->
  <text x="300" y="584"
        font-family="'Arial Narrow', Oswald, 'Helvetica Neue', sans-serif"
        font-size="21"
        font-style="italic"
        font-weight="400"
        text-anchor="middle"
        textLength="320"
        lengthAdjust="spacing"
        fill="#A8780E"
        opacity="0.88">FABRICATION</text>

  <!-- Tiny kintsugi vein threading through the CALLUS text baseline -->
  <path d="M 55,560 L 88,556 L 115,562 L 150,556 L 188,560 L 225,554
           L 262,558 L 300,553 L 338,557 L 376,552 L 414,556
           L 450,550 L 488,555 L 522,550 L 548,554"
        fill="none" stroke="url(#g-horiz)" stroke-width="1.2"
        stroke-linecap="round" opacity="0.50" filter="url(#f-glow)"/>

</svg>
