<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 340" width="840" height="340">
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800;900&display=swap');
      .jones-text {
        font-family: 'Barlow Condensed', 'Oswald', 'Impact', 'Arial Black', sans-serif;
        font-size: 170px;
        font-weight: 900;
        letter-spacing: -2px;
      }
      .excavating-text {
        font-family: 'Barlow Condensed', 'Oswald', 'Arial', sans-serif;
        font-size: 30px;
        font-weight: 500;
        letter-spacing: 10px;
      }
      .contractors-text {
        font-family: 'Barlow Condensed', 'Oswald', 'Arial Black', sans-serif;
        font-size: 30px;
        font-weight: 700;
        letter-spacing: 6px;
      }
    ]]></style>

    <!-- Clip-path for JONES text to enable inline stripes -->
    <clipPath id="jones-clip-1">
      <text x="275" y="185" class="jones-text">JONES</text>
    </clipPath>
  </defs>

  <!-- Outer rounded frame, thin black border -->
  <rect x="3" y="3" width="834" height="334" rx="14" ry="14"
        fill="#FFFFFF" stroke="#0C0E10" stroke-width="4"/>

  <!--
    J MARK — faithful excavator-bucket J:
    Wide top bar → narrows into vertical arm →
    widens into a bucket at the bottom that extends further LEFT.
  -->
  <path d="
    M 80,50
    L 232,50
    L 232,96
    L 148,96
    L 148,262
    L 48,262
    L 48,224
    L 80,224
    Z
  " fill="#0C0E10"/>

  <!-- JONES — solid black wordmark -->
  <text x="275" y="185" class="jones-text" fill="#0C0E10">JONES</text>

  <!-- Inline stripes: horizontal white lines CLIPPED to the JONES text shape -->
  <g clip-path="url(#jones-clip-1)">
    <rect x="270" y="88" width="560" height="5" fill="#FFFFFF"/>
    <rect x="270" y="145" width="560" height="5" fill="#FFFFFF"/>
  </g>

  <!-- EXCAVATING CO. -->
  <text x="278" y="228" class="excavating-text" fill="#4A4845">EXCAVATING CO.</text>

  <!-- GENERAL CONTRACTORS — black bar, white text -->
  <rect x="278" y="248" width="520" height="52" rx="3" fill="#0C0E10"/>
  <text x="538" y="285" class="contractors-text" fill="#FFFFFF" text-anchor="middle">GENERAL CONTRACTORS</text>
</svg>
